🔴 P0：严重阻塞（当前无法交付给真实用户测试）  
1. 无法独立运行：Python 后端未打包进 Tauri  开发者标记：后续处理
MVP 需求：内测需要给 2-3 个真实用户安装使用
当前状态：zhixia.exe 无法 standalone 运行，必须依赖开发环境的 start-dev.bat 和外部 Python venv
阻塞原因：Rust 端虽然能启动 Python 进程，但生产包里没有内嵌 Python 解释器 + 依赖库
修复难度：高（需要引入 pyinstaller 或 nuitka 把 Python 后端打包成单 exe，再由 Tauri 调用）
2. API Key 配置对普通用户不友好
MVP 需求：非技术人员能直接使用
当前状态：必须手动在项目目录下创建 .env 文件填 LLM API 信息
阻塞原因：没有设置界面，普通用户不会也不应该去改代码目录里的隐藏文件
修复方案：前端增加「设置」面板，输入 API Key/Base URL/Model，持久化到本地存储  开发者标记：同意
🟠 P1：明显缺陷（影响核心体验和假设验证） 
3. 召回策略单一：没有混合检索（BM25 + 向量） 开发者标记：现在处理
MVP 已知问题：内测时 Q09 "深蓝色主色调的文档" 未命中
当前状态：仍然只有纯向量检索（ChromaDB）
影响：细节形容词、专有名词、数字编号的召回能力不稳定，直接影响"找到率"指标
修复方案：引入 rank-bm25 或 whoosh 做关键词倒排索引，与向量检索结果做 RRF（Reciprocal Rank Fusion）融合
4. Embedding 模型每次启动都重新加载
MVP 已知问题：all-MiniLM-L6-v2 每次进程启动加载约 2-3 秒
当前状态：换成了 bge-small-zh-v1.5，问题一模一样，甚至更重
影响：Tauri 每次打开应用都要等 Python 后端加载模型，"首次搜索"延迟明显
修复方案：模型常驻内存（当前 FastAPI 进程本身就是长驻的，其实已经比 MVP 的独立 watcher.py 好很多，但如果 Python 进程被重启仍需重载）
5. 关联惊喜度在 UI 中被弱化
MVP 验证点："它懂我在找什么，还提醒了我另一个相关文件"
当前状态：Tauri UI 用正则提取路径做成"星云卡片"，LLM 的关联解释被折叠在 answer-bubble 里，不够醒目
影响：用户可能注意不到"为什么推荐这个文件"，削弱"认知层信任"和"惊喜度"
修复方案：卡片上直接展示"推荐理由"摘要；或者把关联文件用连线/分组方式高亮   开发者标记：增强关联惊喜度，使用连线类似知识图谱
6. 缺少用户反馈闭环
MVP 下一步建议：允许用户标记"这个关联不对"
当前状态：完全没有反馈入口
影响：无法收集真实用户的"找到率/惊喜度/信任度"数据，假设验证只能靠定性观察   开发者标记：现在处理
🟡 P2：待优化（影响稳定性与 completeness）
7. 大文件 / 复杂 Excel 的性能与内存问题
当前状态：.xlsx 直接读全部 sheet，如果用户监控目录里有一个 50MB 的 Excel，会一次性读入内存并传给 LLM
影响：可能 OOM 或导致 ingest 卡住；公式单元格读取的是 data_only=True 的值，若未计算可能为空
修复方案：Excel 按 sheet 分批、按行列截断；超大文件只读前 N 行  开发者标记：可以分批，后台默默处理，不影响用户使用其他，每个文件分一个请求，前端显示进度
8. 错误处理和降级策略不足
当前状态：
LLM API 超时/失败时，ingest 直接抛异常，该文件会永远丢失（除非手动分析）
网络断开时 query 返回 Error: ...，没有缓存或本地 fallback
影响：API 不稳定时用户体验断崖式下降   开发者标记：现在处理
