当前状态：这些测试是基于旧模型（all-MiniLM-L6-v2）和旧数据（5 个 txt）在命令行跑的
当前 BGE 模型 + Tauri UI：只在 ceshi 目录做了 4 个口头测试，且实际数据中现在只剩 2 个 xlsx
风险：BGE 的命中率是否还能维持 94.7% 是未知的  开发者标记：现在处理，计划增加 Tauri UI 的集成测试
10. 监控目录的"桌面"在部分场景下会吸入大量无关文件
当前状态：桌面是很多用户临时堆放文件的地方，可能一次吸入几十个无关的 .lnk、.url、截图等
影响：虽然 unsupported ext 会被过滤，但首次启动扫描时 total_files 统计和索引进度会让用户感觉"很乱"
修复方案：内置一些常见的桌面垃圾文件过滤规则（如 .lnk、.url、截图等），或者在设置里允许用户自定义排除规则  开发者标记：同意，计划增加常见垃圾文件过滤规则