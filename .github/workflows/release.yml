name: 'publish'

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install frontend dependencies
        run: npm install

      - name: setup python venv & install backend dependencies
        shell: pwsh
        run: |
          python -m venv venv
          .\venv\Scripts\pip install --upgrade pip
          .\venv\Scripts\pip install -r requirements.txt

      - name: download embedding model
        shell: pwsh
        run: |
          .\venv\Scripts\python -c "from huggingface_hub import snapshot_download; snapshot_download(repo_id='BAAI/bge-small-zh-v1.5', local_dir='src-tauri/python/models/bge-small-zh-v1.5', local_dir_use_symlinks=False)"

      - name: build python backend
        shell: pwsh
        run: |
          .\venv\Scripts\python src-tauri/python/build_backend.py

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '知匣 ${{ github.ref_name }}'
          releaseBody: |
            知匣桌面端安装包（Windows）
            - 下载 `.msi` 文件即可安装
            - 首次安装后请在设置中配置 LLM (Endpoint ID)
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
